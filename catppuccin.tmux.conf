# Catppuccin 테마 설정
# source-file 순서: 옵션 → 플러그인 실행 → 상태바 포맷

# 1. 테마 옵션 (run catppuccin.tmux 전에 선언해야 적용됨)
set -g @catppuccin_flavor "mocha"
# set -g @catppuccin_status_background "default"          # 기본값 (thm_mantle)
set -g @catppuccin_status_background "#{@thm_surface_0}"
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_left_separator " "    # 왼쪽 구분자
set -g @catppuccin_window_middle_separator " "        # 중간 구분자
set -g @catppuccin_window_right_separator ""   # 오른쪽 구분자
set -g @catppuccin_window_current_number_color "#{@thm_blue}"
# set -g @catppuccin_window_text_color "#{@thm_mantle}"           # 상태바 배경과 동일 (녹아듬)
set -g @catppuccin_window_text_color "#{@thm_surface_0}"           # 우측 상태바 모듈과 동일
# set -g @catppuccin_window_current_text_color "#{@thm_mantle}"   # 상태바 배경과 동일 (녹아듬)
set -g @catppuccin_window_current_text_color "#{@thm_surface_0}"   # 우측 상태바 모듈과 동일
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g window-status-separator " "

# 주석 보관 (이전 시도 값)
# set -g status-style "bg=#1e1e2e"
# set -g @catppuccin_window_default_background "#1e1e2e"
# set -g @catppuccin_window_default_background "default"
# set -g @catppuccin_status_background "none"
# set -g @catppuccin_window_current_text_color "#{@thm_mauve}"
# set -g @catppuccin_window_text_color "#{@thm_overlay_1}"

# 2. 플러그인 실행
run ~/.tmux/plugins/tmux/catppuccin.tmux

# 3. 상태바 포맷 (run catppuccin.tmux 후에 선언해야 변수가 존재함)
set -g status on
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
