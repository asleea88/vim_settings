# 0. PATH 설정 (run-shell 에서 Homebrew 바이너리 접근용)
set-environment -g PATH "/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# 1. 기본 설정
set-option -g prefix C-s
set -g base-index 1
set -g renumber-windows on       # 창 닫으면 번호 당기기
set -g mouse on
set -g mode-keys vi

# 기본 쉘 zsh로 고정
set-option -g default-shell /bin/zsh

# 2. 색상 및 터미널 설정 (True Color)
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# 비활성 패널 어둡게
set -g window-style 'bg=colour235'
set -g window-active-style 'bg=black'

# 3. 윈도우/패널 제목 설정
set-window-option -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set-option -g set-titles on

# 4. 성능 및 히스토리
set -sg escape-time 0
set -g history-limit 10000

# 5. 키 바인딩 (화면 분할 및 이동)
# 현재 경로에서 창 열기
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# prefix + | 로 오른쪽 40% pane 생성
bind | split-window -h -l 40% -c "#{pane_current_path}"

# 패널 크기 조절 (Vim 스타일)
bind-key J resize-pane -D 10
bind-key K resize-pane -U 10
bind-key H resize-pane -L 10
bind-key L resize-pane -R 10

# Shift 화살표로 윈도우 이동
bind -n S-Left  previous-window
bind -n S-Right next-window

# 확장 키(Shift, Alt 등) 입력 허용
# set -s extended-keys on
# set -as terminal-features 'xterm*:extkeys'

# 설정 리로드
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# 6. Smart Pane Switching (Vim-Tmux Navigator)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
is_fzf="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?fzf$'"

bind -n C-h run "($is_vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "($is_vim && tmux send-keys C-j) || ($is_fzf && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "($is_vim && tmux send-keys C-k) || ($is_fzf && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "($is_vim && tmux send-keys C-l) || tmux select-pane -R"

bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l

# 7. 마우스 및 복사 설정
unbind -T copy-mode-vi MouseDragEnd1Pane # 드래그 후 선택 유지
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# 8. 플러그인 목록
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'

# 9. Catppuccin 테마 (옵션 + 플러그인 실행 + 상태바 포맷)
source-file ~/vim_settings/catppuccin.tmux.conf

# 12. 한글 입력 모드 지원 (Korean IME keybinding fallback)
set -g prefix2 C-ㄴ                                              # C-s → C-ㄴ
bind ㅊ new-window -c "#{pane_current_path}"                      # c → ㅊ
bind ㅈ choose-tree -wZ -F '#{window_index}: #{window_name} #{?window_active,(active),}'  # w → ㅈ
bind ㄱ source-file ~/.tmux.conf \; display "Config reloaded!"      # r → ㄱ

bind-key ㅓ resize-pane -D 10                                     # J → ㅓ
bind-key ㅏ resize-pane -U 10                                     # K → ㅏ
bind-key ㅗ resize-pane -L 10                                     # H → ㅗ
bind-key ㅣ resize-pane -R 10                                     # L → ㅣ

# 14. Workmux (Dashboard + Sidebar)
bind S display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "workmux dashboard"

# 15. IDE 열기 (현재 디렉토리 기준)
bind J run-shell '"/Users/sam/Library/Application Support/JetBrains/Toolbox/scripts/idea" "#{pane_current_path}"'

# 16. Claude Code fzf launcher (ccf 팝업 버전)
bind C display-popup -E -w 60% -h 60% "~/vim_settings/ccf-popup.sh"

# 13. TPM 실행 (반드시 맨 끝)
run '~/.tmux/plugins/tpm/tpm'
